logging:
  level: INFO
  jsonl_path: logs/marketwatcher.jsonl
  console: true
telegram:
  default_chat_id: '-1003753066564'
  channels:
  - name: Crypto Sentiment
    chat_id: '-1003753066564'
  - name: On-Chain
    chat_id: '-1003766441216'
  - name: Watchlist
    chat_id: '-1003811035317'
  - name: Alerts
    chat_id: '-1003611619938'
  - name: Macro Sentiment
    chat_id: '-1003733164290'
scheduler:
  timezone: UTC
  timezone_presets:
  - UTC
  - UTC+08:00
  - UTC-05:00
  - UTC+01:00
  - UTC+09:00
report:
  top_gainers_count: 5
  top_losers_count: 5
  decimals: 2
  use_abbreviations: true
  divider_style: "\u2014\u2014"
  timestamp_format: '%Y-%m-%d %H:%M UTC'
  report_timezone: UTC
provider:
  cache_ttl: 300
  timeout: 30
  retry_count: 3
  backoff_factor: 1.5
  rate_limit_calls: 10
  rate_limit_period: 60
alerts:
  check_interval_minutes: 15
onchain:
  pool_fetch_limit: 100
  min_liquidity_usd: 10000
  min_volume_usd: 10000
  exclude_native_tokens: true
  top_gainers_count: 8
  top_losers_count: 8
  movers_candidate_count: 13
  name_exclude_patterns:
  - ^[^a-zA-Z]+$
  - ^(.)\1{3,}
  - .*[0-9]{4,}.*
  max_tokens: 15
