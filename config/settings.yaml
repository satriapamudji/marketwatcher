# MarketWatcher Settings

# Logging configuration
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # JSONL log file path (relative to project root or absolute)
  # Set to null/empty to disable file logging
  jsonl_path: logs/marketwatcher.jsonl

  # Console output (always enabled in TUI)
  console: true

# Report configuration
report:
  # Number of categories to show
  top_gainers_count: 5
  top_losers_count: 5

  # Formatting options
  decimals: 2
  use_abbreviations: true
  divider_style: "——"
  timestamp_format: "%Y-%m-%d %H:%M UTC"
  report_timezone: "UTC"

# Provider configuration
provider:
  # Cache TTL in seconds
  cache_ttl: 300

  # HTTP timeout in seconds
  timeout: 30

  # Retry configuration
  retry_count: 3
  backoff_factor: 1.5

  # Rate limiting
  rate_limit_calls: 10
  rate_limit_period: 60

# Alert loop configuration
alerts:
  # How often to check alert thresholds (minutes)
  check_interval_minutes: 15

# On-chain filters (GeckoTerminal)
onchain:
  # Number of pools to fetch from GeckoTerminal before local filtering/deduping
  pool_fetch_limit: 100

  # Minimum liquidity in USD to include a pool/token
  min_liquidity_usd: 10000

  # Minimum volume in USD (24h)
  min_volume_usd: 10000

  # Exclude chain-native assets (e.g., SOL on Solana, ETH/WETH on Base)
  exclude_native_tokens: true

  # Movers output counts (display)
  top_gainers_count: 8
  top_losers_count: 8

  # Overfetch candidates before final display trim (helps after filtering/deduping)
  movers_candidate_count: 13

  # Filter out tokens with these patterns in name/symbol
  name_exclude_patterns:
    - "^[^a-zA-Z]+$"  # No non-letter characters only
    - "^(.)\\1{3,}"   # 4+ repeated chars (BILl, CHIp)
    - ".*[0-9]{4,}.*" # 4+ consecutive digits

  # Manual symbol excludes (case-insensitive)
  # symbol_exclude_list: ["USDC", "USDT"]

  # Only include these DEXes (empty = all)
  # dex_whitelist: ["raydium", "orca", "jupiter", "orca-clmm", "raydium-cpm"]

  # Top tokens to always include (by symbol)
  # top_tokens: ["SOL", "BTC", "ETH", "USDC", "USDT"]

  # Maximum tokens to show
  max_tokens: 15
